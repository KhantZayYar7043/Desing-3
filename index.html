<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Hub</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: #0b0813; color: #f1f0f5; display: flex; flex-direction: column; min-height: 100vh; }
        
        :root {
            --neon-purple: #a855f7;
            --neon-pink: #f43f5e;
            --dark-bg: #120e22;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0b0813; }
        ::-webkit-scrollbar-thumb { background: var(--neon-purple); border-radius: 3px; }

        /* Header */
        header { 
            background-color: var(--dark-bg); padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; 
            position: sticky; top: 0; z-index: 100; border-bottom: 2px solid var(--neon-purple);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
        }
        .logo { font-size: 22px; font-weight: 900; color: #fff; text-shadow: 0 0 10px var(--neon-pink); cursor: pointer; user-select: none; }
        
        .search-box { display: flex; background: #1b1532; border-radius: 8px; padding: 4px; width: 45%; max-width: 350px; border: 1px solid var(--neon-purple); }
        .search-box input { width: 100%; padding: 6px 12px; border: none; background: transparent; color: #fff; outline: none; font-size: 13px; }
        .search-box button { padding: 6px 18px; border: none; background: var(--neon-pink); color: #fff; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 13px; }

        /* Layout */
        .container { display: flex; flex: 1; position: relative; }
        
        /* Sidebar */
        aside { width: 230px; background-color: #0d0a1a; padding: 20px 12px; display: flex; flex-direction: column; gap: 8px; border-right: 1px solid rgba(168, 85, 247, 0.1); }
        aside button { background: transparent; border: none; color: #94a3b8; text-align: left; padding: 12px 15px; font-size: 14px; font-weight: 500; cursor: pointer; border-radius: 6px; transition: 0.2s; }
        aside button:hover, aside button.active { color: #fff; background: rgba(168, 85, 247, 0.2); border-left: 3px solid var(--neon-pink); }

        /* Main Content */
        main { flex: 1; padding: 20px; background-color: #0b0813; }
        
        /* Video Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
        
        /* Video Card */
        .card { background: #16122c; border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.25s ease; border: 1px solid rgba(168, 85, 247, 0.1); display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 0 15px rgba(244, 63, 94, 0.3); border-color: var(--neon-pink); }
        
        .thumb-container { width: 100%; aspect-ratio: 16/10; background: #000; position: relative; overflow: hidden; }
        .thumb-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .duration { position: absolute; bottom: 8px; right: 8px; background: rgba(0, 0, 0, 0.8); padding: 2px 6px; font-size: 11px; border-radius: 4px; color: #fff; font-weight: 600; border: 1px solid var(--neon-purple); }
        
        .info { padding: 12px; display: flex; flex-direction: column; gap: 4px; }
        .video-title { font-size: 13.5px; font-weight: 500; line-height: 1.4; height: 38px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; color: #e2e8f0; }
        .card:hover .video-title { color: var(--neon-pink); }
        .views { font-size: 11.5px; color: #94a3b8; } 

        /* Watch Section */
        #watchSection { display: none; width: 100%; max-width: 900px; margin: 0 auto; }
        .back-btn { background: #16122c; color: #e2e8f0; border: 1px solid var(--neon-purple); padding: 8px 18px; border-radius: 30px; cursor: pointer; font-weight: 600; font-size: 13px; margin-bottom: 20px; display: inline-block; }
        .back-btn:hover { background: #fff; color: #000; }
        .player-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.7); border: 1px solid var(--neon-purple); }
        .player-container iframe { width: 100%; height: 100%; border: none; }
        .watch-title { font-size: 18px; font-weight: 600; margin-top: 15px; color: #fff; } 

        /* VIP Banner */
        .vip-neon-box { margin-top: 25px; padding: 22px; background: #120e22; border-radius: 12px; text-align: center; position: relative; border: 1px solid var(--neon-purple); box-shadow: 0 0 15px rgba(168, 85, 247, 0.2); }
        .vip-neon-text { font-size: 14px; line-height: 1.7; color: #cbd5e1; margin-bottom: 18px; }
        .vip-neon-text span.highlight { color: #f43f5e; font-weight: bold; }
        .vip-neon-text span.price { color: #a855f7; font-weight: 800; font-size: 18px; text-shadow: 0 0 8px var(--neon-purple); } 
        .vip-btn { display: inline-block; padding: 12px 45px; font-size: 14px; font-weight: 800; color: #fff; text-decoration: none; border-radius: 6px; background: var(--neon-pink); box-shadow: 0 0 15px rgba(244, 63, 94, 0.4); transition: 0.2s; }
        .vip-btn:hover { transform: translateY(-2px); box-shadow: 0 0 20px rgba(244, 63, 94, 0.7); } 

        /* Load More Button */
        .load-more-btn { display: block; width: 180px; margin: 30px auto; padding: 12px; background: #16122c; color: #fff; border: 1px solid var(--neon-purple); border-radius: 8px; font-weight: 600; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .load-more-btn:hover { background: var(--neon-purple); box-shadow: 0 0 10px var(--neon-purple); } 

        /* Responsive UI Mobile */
        @media (max-width: 768px) {
            .container { flex-direction: column; }
            aside { width: 100%; flex-direction: row; overflow-x: auto; padding: 8px; gap: 6px; border-right: none; border-bottom: 1px solid rgba(168, 85, 247, 0.1); }
            aside button { padding: 6px 12px; font-size: 12.5px; shrink: 0; white-space: nowrap; }
            .search-box { width: 50%; }
            main { padding: 12px; }
            .grid { grid-template-columns: repeat(2, 1fr) !important; gap: 12px; }
            .video-title { font-size: 12px; height: 34px; }
        }
    </style>

<body> 

    <header>
        <div class="logo" onclick="goHome()">Midnight Hub</div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="ရှာဖွေရန်...">
            <button onclick="handleSearch()">ရှာပါ</button>
        </div>
    </header> 

    <div class="container">
        <aside>
            <button onclick="filterCategory('myanmar', this)" class="active">မြန်မာကားများ</button>
            <button onclick="filterCategory('asian', this)">အာရှ</button>
            <button onclick="filterCategory('japanese', this)">ဂျပန်</button>
            <button onclick="filterCategory('milf', this)">မမများ</button>
            <button onclick="filterCategory('amateur', this)">အပျော်တမ်း</button>
        </aside> 

        <main>
            <div id="gallerySection">
                <div class="grid" id="videoGrid"></div>
                <button class="load-more-btn" id="loadMoreBtn" onclick="loadMore()">နောက်ထပ်ကြည့်ရန်</button>
            </div> 

            <div id="watchSection">
                <button class="back-btn" onclick="goHome()">← နောက်သို့ပြန်သွားရန်</button>
                <div class="player-container">
                    <iframe id="videoPlayer" allowfullscreen></iframe>
                </div>
                <div class="watch-title" id="videoTitle"></div> 

                <div class="vip-neon-box">
                    <div class="vip-neon-text">
                        မြန်မာချောင်းရိုက် // ကလေး အောကား // ဆယ်လီ အောကား // local leak // အထန်မလေးတွေ တစ်နေရာတည်းမှာ အစုံအလင်ကြည့်ဖို့ <span class="price">15000ks</span> ထဲဖြင့် <span class="highlight">Vip ဝင်နိုင်ပါပြီ</span>
                    </div>
                    <a href="https://t.me/Burma_VIP_Bot?start=Start" target="_blank" class="vip-btn">Vip ဝယ်ယူရန်</a>
                </div>
            </div>
        </main>
    </div> 

    <script>
        const API_BASE = 'https://www.eporner.com/api/v2/video/search/';
        let page = 1;
        let currentQuery = 'myanmar';
        const perPage = 24; 

        const videoGrid = document.getElementById('videoGrid');
        const gallerySection = document.getElementById('gallerySection');
        const watchSection = document.getElementById('watchSection');
        const videoPlayer = document.getElementById('videoPlayer');
        const videoTitle = document.getElementById('videoTitle');
        const loadMoreBtn = document.getElementById('loadMoreBtn'); 

        function getRandomPage() {
            return Math.floor(Math.random() * 15) + 1;
        } 

        // 🌐 Eporner API ဗီဒီယိုအများကြီးဆွဲယူသည့် Function
        async function fetchVideos(query = 'myanmar', append = false) {
            if (!append) { 
                page = getRandomPage();
                videoGrid.innerHTML = '<p style="padding:20px; color:var(--neon-purple); font-weight:600; font-size:14px;">ဗီဒီယိုများ အသစ်ပြောင်းလဲဆွဲယူနေပါသည်...</p>'; 
            }
            try {
                const searchKeyword = query ? query : 'myanmar';
                const url = `${API_BASE}?query=${encodeURIComponent(searchKeyword)}&per_page=${perPage}&page=${page}&thumbsize=big`;
                const res = await fetch(url);
                const data = await res.json(); 

                if (!append) videoGrid.innerHTML = ''; 

                if (data && data.videos && data.videos.length > 0) {
                    let shuffledVideos = data.videos.sort(() => Math.random() - 0.5);
                    renderCards(shuffledVideos);
                    loadMoreBtn.style.display = 'block';
                } else {
                    if (!append) videoGrid.innerHTML = '<p style="padding:20px; color:#94a3b8; font-size:14px;">ဗီဒီယို ရှာမတွေ့ပါ။</p>';
                    loadMoreBtn.style.display = 'none';
                }
            } catch (err) {
                console.error(err);
                if (!append) videoGrid.innerHTML = '<p style="padding:20px; color:var(--neon-pink); font-size:14px;">Error: အချက်အလက်ယူလို့မရပါ။ VPN ဖွင့်ထားဖို့ လိုအပ်ပါသည်။</p>';
            }
        } 

        function renderCards(videos) {
            videos.forEach(v => {
                const card = document.createElement('div');
                card.className = 'card';
                const imgUrl = v.default_thumb ? v.default_thumb.src : (v.thumbs && v.thumbs.length > 0 ? v.thumbs[0].src : ''); 

                card.innerHTML = `
                    <div class="thumb-container">
                        <img src="${imgUrl}" alt="${v.title}" loading="lazy">
                        <span class="duration">${v.length_min || '00'}:${v.length_sec || '00'}</span>
                    </div>
                    <div class="info">
                        <div class="video-title">${v.title}</div>
                        <div class="views">👁️ ${parseInt(v.views).toLocaleString()}</div>
                    </div>
                `;
                card.onclick = () => openWatchPage(v.embed, v.title);
                videoGrid.appendChild(card);
            });
        } 

        function openWatchPage(embedUrl, title) {
            gallerySection.style.display = 'none';
            watchSection.style.display = 'block';
            videoPlayer.src = embedUrl;
            videoTitle.innerText = title;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } 

        function goHome() {
            watchSection.style.display = 'none';
            videoPlayer.src = '';
            gallerySection.style.display = 'block';
        } 

        function filterCategory(cat, btn) {
            document.querySelectorAll('aside button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentQuery = cat;
            goHome();
            fetchVideos(currentQuery, false);
        } 

        function handleSearch() {
            const val = document.getElementById('searchInput').value.trim();
            currentQuery = val;
            goHome();
            fetchVideos(currentQuery, false);
        } 

        function loadMore() {
            page++;
            fetchVideos(currentQuery, true);
        } 

        // Initial Load
        fetchVideos('myanmar', false);
    </script>
